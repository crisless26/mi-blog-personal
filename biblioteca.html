<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Espacio Digital | CrisLoQueSea</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Cabecera de navegación (Navbar): barra superior fija con enlaces a las secciones principales -->
    <header class="navbar">
        <div class="logo">CrisLoQueSea</div>
        <nav>
            <a href="index.html"><i class="fa-solid fa-house"></i> Inicio</a>

            <a href="biblioteca.html"><i class="fa-solid fa-palette"></i> Galeria de Dibujos</a>

            <a href="multimedia.html"><i class="fa-solid fa-icons"></i> Multimedia</a>
            
            <a href="sobre-mi.html"><i class="fa-solid fa-user"></i> Sobre mí</a>
            
            <a href="#redes" class="btn-redes"><i class="fa-solid fa-at"></i> Mis Redes</a>
        </nav>
    </header>

    <!-- Contenido principal: sección de biblioteca y galería de dibujos -->
    <main>
        <!-- Encabezado de la Biblioteca con título y descripción -->
        <section class="biblioteca-header">
            <h1>Galeria de Dibujos</h1>
            <p>Aquí recopilo mis trabajos digitales. Estética y técnica.</p>
        </section>

        <!-- Cuadrícula (Grid) de la Galería: contiene cada una de las tarjetas de los dibujos -->
        <section class="galeria-grid">
            <!-- Cada div 'dibujo-card' representa una tarjeta de imagen en la galería -->
            <div class="dibujo-card">
                <img src="assets/img/dibujo1.jpg" alt="Dibujo 1">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo2.png" alt="Dibujo 2">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo3.jpg" alt="Dibujo 3">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo4.png" alt="Dibujo 4">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo5.jpg" alt="Dibujo 5">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo6.jpg" alt="Dibujo 6">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo7.png" alt="Dibujo 7">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo8.png" alt="Dibujo 8">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo9.png" alt="Dibujo 9">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo10.png" alt="Dibujo 10">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo11.jpg" alt="Dibujo 11">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo12.png" alt="Dibujo 12">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo13.png" alt="Dibujo 13">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo14.png" alt="Dibujo 14">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo15.jpg" alt="Dibujo 15">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo16.jpg" alt="Dibujo 16">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo17.jpg" alt="Dibujo 17">
            </div>
            <div class="dibujo-card">
                <img src="assets/img/dibujo18.png" alt="Dibujo 18">
            </div>
        </section>
    </main>

    <!-- Área de Modal de Zoom: se abre dinámicamente mediante JS al hacer clic en cualquier dibujo -->
    <div id="modal-zoom" class="modal">
        <!-- Botón para cerrar el modal (X) -->
        <span class="cerrar">&times;</span>
        
        <!-- Flechas de navegación para navegar entre imágenes -->
        <a class="prev">&#10094;</a>
        <a class="next">&#10095;</a>
        
        <!-- Botón para descargar el dibujo activo, con icono de descarga -->
        <a id="btn-descargar" href="#" download class="btn-descargar" title="Descargar imagen">
            <i class="fa-solid fa-download"></i>
        </a>
        
        <!-- Imagen ampliada que se muestra en el modal -->
        <img class="modal-content" id="img-ampliada" alt="Imagen ampliada">
    </div>

 <!-- Pie de página (Footer) con enlaces a redes sociales y créditos -->
    <footer id="redes">
        <div class="social-links">
            <h2>Mis Redes</h2>
            <div class="tech-card">
            <a href="https://www.facebook.com/MestMartin?locale=es_LA" target="_blank"><i class="fa-brands fa-facebook"></i> Facebook</a>
            </div>
            <div class="tech-card">
            <a href="https://www.instagram.com/crisloquesea/" target="_blank"><i class="fa-brands fa-instagram"></i> IG Personal</a>
            </div>
            <div class="tech-card">
            <a href="https://www.instagram.com/crisdibujitosfeos/" target="_blank"><i class="fa-brands fa-instagram"></i> IG Dibujos</a>
            </div>
            <div class="tech-card">
            <a href="https://github.com/crisless26" target="_blank"><i class="fa-brands fa-github"></i> GitHub</a>
            </div>
            <div class="tech-card">
            <a href="https://www.tumblr.com/crisloquesea?source=share" target="_blank"><i class="fa-brands fa-square-tumblr"></i> Tumblr</a>
            </div>
        </div>
        <p>Hecho con 💜 por CrisLoQueSea</p>
    </footer>

    <!-- Enlace al archivo JavaScript principal con la lógica interactiva -->
    <script src="js/main.js"></script>
</body>
</html>
